[defaults]
# Inventory file location
inventory = inventory/hosts.yml

# Remote user settings
remote_user = root

# Disable host key checking for VPS environments
host_key_checking = False

# Retry failed tasks
retry_files_enabled = True
retry_files_save_path = /var/log/vps-setup/retry/

# Temporary directory settings
remote_tmp = /tmp
allow_world_readable_tmpfiles = True

# Parallel execution
forks = 2

# Fact caching for performance
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /var/log/vps-setup/facts_cache
fact_caching_timeout = 3600

# Output formatting
stdout_callback = default
callback_whitelist = profile_tasks, timer

# Log all output
log_path = /var/log/vps-setup/ansible.log

# Role path
roles_path = roles

# Timeout settings
timeout = 30
gather_timeout = 30

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
# SSH performance optimizations
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30

[colors]
changed = yellow
ok = green
error = red
warn = purple
