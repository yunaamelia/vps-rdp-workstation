---
# VPS RDP Workstation Configuration
# =================================
# This file contains all customizable parameters for the deployment

# === System Configuration ===
vps_username: "apexdev"           # Primary workstation user (REQUIRED)
vps_password_hash: "$6$test$QoG/jLk8dlVZC4Ig4XQXv5F9KlM3qR6UPbWTvKnH3RmZ1KjHqYB2kLVpF8Jh1Qd5vN0wM."  # TEST HASH - Replace via setup.sh
vps_timezone: "Asia/Singapore"         # System timezone (IANA format)
vps_hostname: "dev-workstation"     # System hostname
vps_locale: "en_US.UTF-8"           # System locale
vps_keyboard: "us"                  # Keyboard layout

# === User Configuration ===
vps_ssh_public_key: ""              # SSH public key (optional)
vps_user_groups:
  - sudo
  - docker
  - users

# === Sudo Configuration ===
sudo_nopasswd_commands:
  - APT_CMDS: "/usr/bin/apt update, /usr/bin/apt upgrade -y, /usr/bin/apt install *"
  - SYSTEMCTL_CMDS: "/bin/systemctl restart docker, /bin/systemctl status *"
  - DOCKER_CMDS: "/usr/bin/docker *, /usr/bin/docker-compose *"

# === Theme Configuration ===
vps_theme: "catppuccin"             # Options: catppuccin, breeze-dark
vps_icon_theme: "papirus-dark"      # Icon theme
vps_font_size: 11                   # System font size
nerd_font_install_path: "/home/{{ vps_username }}/.local/share/fonts"
nerd_font_url: "https://github.com/ryanoasis/nerd-fonts/releases/download/v3.3.0/JetBrainsMono.zip"
starship_preset: "nerd-font-symbols"

# === Desktop Environment ===
kde_compositor_enabled: false       # Disable for RDP performance
kde_effects_enabled: false          # Disable heavy effects
xrdp_max_bpp: 24                    # Color depth
xrdp_port: 3389                     # RDP port
xrdp_tcp_nodelay: true              # Enable TCP_NODELAY for better latency
xrdp_security_layer: "negotiate"    # Security layer: tls, rdp, negotiate
xrdp_crypt_level: "high"            # Encryption level: low, medium, high, fips
xrdp_ssl_protocols: "TLSv1.2, TLSv1.3"  # Allowed SSL/TLS protocols

# === Development Tools ===
install_nodejs: true
install_python: true
install_php: true
install_docker: true
docker_storage_driver: "overlay2"
docker_log_driver: "json-file"
docker_log_max_size: "10m"
docker_log_max_file: "3"
docker_live_restore: true

install_vscode: true
install_opencode: true
install_antigravity: true              # Google Antigravity IDE

nodejs_version: "20"
python_version: "3.12"
php_version: "8"

# === npm Global Packages ===
npm_global_packages:
  - yarn
  - pnpm
  - typescript
  - ts-node
  - prettier
  - eslint
  - nodemon
  - pm2
  - http-server

# === pipx Packages ===
pipx_packages:
  - black
  - pylint
  - pytest
  - ipython
  - poetry
  - httpie

# === Zsh Configuration ===
zsh_builtin_plugins:
  - git
  - docker
  - sudo
  - vscode

zsh_custom_plugins:
  - name: zsh-autosuggestions
    repo: https://github.com/zsh-users/zsh-autosuggestions
  - name: zsh-syntax-highlighting
    repo: https://github.com/zsh-users/zsh-syntax-highlighting


# === VS Code Extensions ===
vscode_extensions:
  - dbaeumer.vscode-eslint
  - esbenp.prettier-vscode
  - ms-python.python
  - ms-python.vscode-pylance
  - bmewburn.vscode-intelephense-client
  - eamodio.gitlens
  - rangav.vscode-thunder-client
  - PKief.material-icon-theme
  - zhuangtongfa.Material-theme
  - ms-azuretools.vscode-docker

# === Security Configuration ===
ssh_port: 22
# Firewall
ufw_enabled: true
ufw_allowed_ports:
  - { port: 22, proto: tcp, comment: "SSH" }
  - { port: 3389, proto: tcp, comment: "XRDP" }

# Fail2ban
fail2ban_enabled: true
fail2ban_bantime: 3600
fail2ban_findtime: 600
fail2ban_maxretry: 5
fail2ban_jails:
  sshd:
    enabled: true
    port: 22
    logpath: /var/log/auth.log
    maxretry: 5
    bantime: 3600

ssh_permit_root_login: "yes"
ssh_password_authentication: "yes"
ssh_pubkey_authentication: "yes"
ssh_max_auth_tries: 3

unattended_upgrades_enabled: true
unattended_upgrades_auto_reboot: true
unattended_upgrades_reboot_time: "03:00"

# === Performance Tuning ===
vm_swappiness: 10
vm_vfs_cache_pressure: 50
tcp_congestion_control: "bbr"
io_scheduler: "mq-deadline"

sysctl_performance:
  vm.swappiness: "{{ vm_swappiness }}"
  vm.vfs_cache_pressure: "{{ vm_vfs_cache_pressure }}"
  net.ipv4.tcp_congestion_control: "{{ tcp_congestion_control }}"
  net.core.default_qdisc: fq
  net.ipv4.ip_forward: 1

kde_theme:
  catppuccin:
    color_scheme: "CatppuccinMocha"
    icon_theme: "Papirus-Dark"
  breeze-dark:
    color_scheme: "BreezeDark"
    icon_theme: "breeze-dark"

services_to_disable:
  - cups
  - cups-browsed
  - bluetooth
  - avahi-daemon
  - whoopsie

git_config:
  user.name: "{{ vps_username }}"
  user.email: "{{ vps_username }}@{{ vps_hostname }}"
  init.defaultBranch: main
  core.editor: nano
  credential.helper: store

# === Phase 10 Additional Extensions (Optional) ===
install_database_tools: true
install_cloud_tools: false
install_productivity_tools: true
install_monitoring_tools: true
install_backup_automation: true

# === Deployment Options ===
auto_rollback_enabled: true
skip_validation: false
dry_run: false
verbose_logging: true
vps_skip_reboot: false

# === Paths ===
vps_setup_log_dir: "/var/log/vps-setup"
state_file: "/var/log/vps-setup/deployment-state.json"
