---
#===============================================================================
# Phase 2: User Management & Access Configuration
#===============================================================================
# Creates the primary workstation user with secure sudo configuration
#===============================================================================

- name: Validate password hash is provided
  ansible.builtin.assert:
    that:
      - vps_password_hash | length > 0
    fail_msg: "Password hash must be provided. Use setup.sh or set VPS_PASSWORD_HASH."

- name: Create workstation user
  ansible.builtin.user:
    name: "{{ vps_username }}"
    password: "{{ vps_password_hash }}"
    shell: /bin/bash
    groups:
      - sudo
    append: yes
    create_home: yes
    state: present
  register: user_created

- name: Ensure user home directory permissions
  ansible.builtin.file:
    path: "/home/{{ vps_username }}"
    owner: "{{ vps_username }}"
    group: "{{ vps_username }}"
    mode: '0750'

- name: Configure passwordless sudo for specific commands
  ansible.builtin.template:
    src: ../templates/sudoers.d/nopasswd-user.j2
    dest: "/etc/sudoers.d/{{ vps_username }}"
    owner: root
    group: root
    mode: '0440'
    validate: 'visudo -cf %s'

- name: Configure sudo logging
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    regexp: '^Defaults\s+logfile='
    line: 'Defaults logfile="/var/log/sudo.log"'
    state: present
    validate: 'visudo -cf %s'

- name: Create sudo log file
  ansible.builtin.file:
    path: /var/log/sudo.log
    state: touch
    owner: root
    group: root
    mode: '0600'
    modification_time: preserve
    access_time: preserve

- name: Document user permissions
  ansible.builtin.copy:
    content: |
      User: {{ vps_username }}
      Created: {{ ansible_date_time.iso8601 }}
      Groups: sudo
      Home: /home/{{ vps_username }}
      
      Passwordless sudo commands:
      {% for cmd_group in sudo_nopasswd_commands %}
      {% for name, cmds in cmd_group.items() %}
      - {{ name }}: {{ cmds }}
      {% endfor %}
      {% endfor %}
      
      Sudo log: /var/log/sudo.log
    dest: "{{ vps_setup_log_dir }}/user-permissions-{{ vps_username }}.txt"
    mode: '0644'

- name: Mark Phase 2 complete
  ansible.builtin.copy:
    content: |
      Phase 2: User Management - COMPLETE
      Timestamp: {{ ansible_date_time.iso8601 }}
      User: {{ vps_username }}
      User Created: {{ user_created.changed | default(false) }}
    dest: "{{ vps_setup_log_dir }}/phase2-complete.txt"
    mode: '0644'

- name: Phase 2 completion notice
  ansible.builtin.debug:
    msg: "✅ Phase 2: User Management Complete - User '{{ vps_username }}' configured"
