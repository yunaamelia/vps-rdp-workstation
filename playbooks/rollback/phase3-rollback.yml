---
# Phase 3 rollback - Remove dependencies
- name: Remove development tools
  ansible.builtin.apt:
    name:
      - nodejs
      - php
      - php-cli
      - php-common
      - gh
      - lazygit
    state: absent
    purge: yes
  ignore_errors: yes

- name: Remove external repositories
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/nodesource.list
    - /etc/apt/sources.list.d/github-cli.list
    - /etc/apt/sources.list.d/docker.list
    - /etc/apt/sources.list.d/vscode.list
  ignore_errors: yes

- name: Remove Composer
  ansible.builtin.file:
    path: /usr/local/bin/composer
    state: absent

- name: Remove npm global packages
  ansible.builtin.file:
    path: "/home/{{ vps_username }}/.npm-global"
    state: absent
