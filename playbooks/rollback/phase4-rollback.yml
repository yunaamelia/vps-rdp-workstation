---
# Phase 4 rollback - Remove Desktop Environment
- name: Stop desktop services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - xrdp
    - sddm
  ignore_errors: true

- name: Remove XRDP and desktop packages
  ansible.builtin.apt:
    name:
      - xrdp
      - xorgxrdp
      - sddm
      - kde-plasma-desktop
      - konsole
      - dolphin
      - kate
      - ark
      - plasma-systemmonitor
      - plasma-nm
      - plasma-pa
      - kscreen
      - powerdevil
      - breeze-gtk-theme
      - papirus-icon-theme
    state: absent
    purge: true
  ignore_errors: true

- name: Remove user desktop configuration
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/home/{{ vps_username }}/.xsession"
    - "/home/{{ vps_username }}/.local/share/konsole"
    - "/home/{{ vps_username }}/.config/konsolerc"

- name: Remove phase 4 log
  ansible.builtin.file:
    path: "{{ vps_setup_log_dir }}/phase4-complete.txt"
    state: absent
