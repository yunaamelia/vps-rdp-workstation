---
# Phase 7 rollback - Remove optimization configuration
- name: Stop and disable Fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: stopped
    enabled: false
  ignore_errors: true

- name: Reset UFW
  community.general.ufw:
    state: reset
  ignore_errors: true

- name: Remove Fail2ban configuration
  ansible.builtin.file:
    path: /etc/fail2ban/jail.local
    state: absent

- name: Remove sysctl performance tuning
  ansible.builtin.file:
    path: /etc/sysctl.d/99-vps-performance.conf
    state: absent

- name: Remove phase 7 log
  ansible.builtin.file:
    path: "{{ vps_setup_log_dir }}/phase7-complete.txt"
    state: absent
