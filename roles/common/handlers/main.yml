---
# Handlers for Phase 4 RDP Packages
# These are called via notify: in tasks

- name: Restart XRDP
  ansible.builtin.systemd:
    name: xrdp
    state: restarted
    daemon_reload: true

- name: Restart Docker
  ansible.builtin.systemd:
    name: docker
    state: restarted
    daemon_reload: true

- name: Restart SSH
  ansible.builtin.systemd:
    name: ssh
    state: restarted

- name: Restart SDDM
  ansible.builtin.systemd:
    name: sddm
    state: restarted

- name: Restart Fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted

- name: Reload UFW
  community.general.ufw:
    state: reloaded

- name: Update font cache
  ansible.builtin.command: fc-cache -fv
  changed_when: false
