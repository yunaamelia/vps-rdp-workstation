---
# Common role - Base system setup and utilities

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: dist
    autoremove: true
    autoclean: true
  register: system_upgrade

- name: Install essential packages
  ansible.builtin.apt:
    name:
      - build-essential
      - apt-transport-https
      - ca-certificates
      - curl
      - wget
      - git
      - gnupg
      - lsb-release
      - vim
      - nano
      - htop
      - tmux
      - tree
      - jq
      - unzip
      - tar
      - rsync
      - fzf
      - ripgrep
    state: present

- name: Set timezone
  community.general.timezone:
    name: "{{ vps_timezone }}"

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ vps_hostname }}"

- name: Update /etc/hosts with hostname
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "^127\\.0\\.1\\.1"
    line: "127.0.1.1 {{ vps_hostname }}"
    state: present
