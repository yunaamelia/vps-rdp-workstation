---
# System performance optimization for VPS and RDP

- name: Configure system performance parameters
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/99-vps-rdp-performance.conf
  loop:
    # Memory management
    - { key: "vm.swappiness", value: "10" }
    - { key: "vm.vfs_cache_pressure", value: "50" }
    - { key: "vm.dirty_ratio", value: "10" }
    - { key: "vm.dirty_background_ratio", value: "5" }
    # Network optimization for RDP
    - { key: "net.core.rmem_max", value: "16777216" }
    - { key: "net.core.wmem_max", value: "16777216" }
    - { key: "net.ipv4.tcp_fastopen", value: "3" }
    - { key: "net.ipv4.tcp_slow_start_after_idle", value: "0" }
  become: true
  ignore_errors: true

- name: Enable BBR congestion control
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/99-vps-rdp-performance.conf
  loop:
    - { key: "net.ipv4.tcp_congestion_control", value: "bbr" }
    - { key: "net.core.default_qdisc", value: "fq" }
  become: true
  ignore_errors: true

- name: Configure I/O scheduler for SSD
  ansible.builtin.copy:
    content: |
      # Set deadline scheduler for better VPS performance
      ACTION=="add|change", KERNEL=="sd[a-z]", ATTR{queue/scheduler}="mq-deadline"
      ACTION=="add|change", KERNEL=="nvme[0-9]n[0-9]", ATTR{queue/scheduler}="none"
    dest: /etc/udev/rules.d/60-scheduler.rules
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Disable unnecessary services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    state: stopped
  loop:
    - bluetooth.service
    - cups.service
    - avahi-daemon.service
  become: true
  ignore_errors: true

- name: Enable TRIM timer for SSD
  ansible.builtin.systemd:
    name: fstrim.timer
    enabled: true
    state: started
  become: true
  ignore_errors: true
