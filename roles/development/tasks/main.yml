---
# Development role - Programming languages and tools

# Node.js
- name: Add NodeSource GPG key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /usr/share/keyrings/nodesource.asc
    mode: '0644'

- name: Add NodeSource repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/nodesource.asc] https://deb.nodesource.com/node_20.x nodistro main"
    state: present
    filename: nodesource

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: yes

- name: Install global npm packages
  community.general.npm:
    name: "{{ item }}"
    global: yes
    state: present
  loop:
    - yarn
    - pnpm
    - typescript
    - ts-node
    - prettier
    - eslint

# Python
- name: Install Python packages
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
      - pipx
    state: present

# PHP
- name: Install PHP and extensions
  ansible.builtin.apt:
    name:
      - php
      - php-cli
      - php-common
      - php-curl
      - php-mbstring
      - php-xml
      - php-mysql
      - php-zip
      - php-gd
      - php-intl
      - php-bcmath
    state: present

- name: Download Composer
  ansible.builtin.get_url:
    url: https://getcomposer.org/installer
    dest: /tmp/composer-installer.php
    mode: '0755'

- name: Install Composer
  ansible.builtin.command: php /tmp/composer-installer.php --install-dir=/usr/local/bin --filename=composer
  args:
    creates: /usr/local/bin/composer

# Git tools
- name: Add GitHub CLI repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
    state: present
    filename: github-cli
  ignore_errors: yes

- name: Install GitHub CLI
  ansible.builtin.apt:
    name: gh
    state: present
  ignore_errors: yes

- name: Download Lazygit
  ansible.builtin.get_url:
    url: https://github.com/jesseduffield/lazygit/releases/latest/download/lazygit_0.44.1_Linux_x86_64.tar.gz
    dest: /tmp/lazygit.tar.gz

- name: Extract Lazygit
  ansible.builtin.unarchive:
    src: /tmp/lazygit.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Install Lazygit
  ansible.builtin.copy:
    src: /tmp/lazygit
    dest: /usr/local/bin/lazygit
    mode: '0755'
    remote_src: yes
