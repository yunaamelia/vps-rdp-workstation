---
# handlers/main.yml for enhancements role

- name: Reload Zsh configuration
  ansible.builtin.shell: |
    rm -f {{ enhancements_home }}/.zcompdump*
  become: true
  become_user: "{{ enhancements_user }}"

- name: Restart Tmux server
  ansible.builtin.shell: |
    if pgrep -u {{ enhancements_user }} tmux > /dev/null; then
      tmux kill-server || true
    fi
  become: true
  become_user: "{{ enhancements_user }}"
  ignore_errors: true

- name: Recompile Zsh config
  ansible.builtin.shell: |
    # If zcompdump exists, remove it
    rm -f {{ enhancements_home }}/.zcompdump*
  become: true
  become_user: "{{ enhancements_user }}"
- name: Install tmux plugins
  ansible.builtin.shell: |
    if [ -f ~/.tmux/plugins/tpm/bin/install_plugins ]; then
      export TMUX_PLUGIN_MANAGER_PATH=~/.tmux/plugins
      ~/.tmux/plugins/tpm/bin/install_plugins
    fi
  become: true
  become_user: "{{ enhancements_user }}"
  ignore_errors: true
