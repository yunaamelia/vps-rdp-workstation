---
#===============================================================================
# Phase 9.10: AI Code Completion (Codeium)
#===============================================================================
# Installs Codeium VS Code extension for AI-powered code completion
#===============================================================================

#-------------------------------------------------------------------------------
# Check VS Code availability
#-------------------------------------------------------------------------------

- name: Check if VS Code is installed
  ansible.builtin.stat:
    path: /usr/bin/code
  register: vscode_installed

#-------------------------------------------------------------------------------
# Install Codeium Extension
#-------------------------------------------------------------------------------

- name: Install Codeium extension for VS Code
  ansible.builtin.command: code --install-extension Codeium.codeium --force
  become: yes
  become_user: "{{ vps_username }}"
  environment:
    HOME: "/home/{{ vps_username }}"
  when: vscode_installed.stat.exists
  register: codeium_install
  changed_when: "'already installed' not in codeium_install.stdout | default('')"
  failed_when: false

#-------------------------------------------------------------------------------
# Verify Installation
#-------------------------------------------------------------------------------

- name: Check Codeium installation status
  ansible.builtin.command: code --list-extensions
  become: yes
  become_user: "{{ vps_username }}"
  environment:
    HOME: "/home/{{ vps_username }}"
  register: vscode_extensions
  changed_when: false
  failed_when: false
  when: vscode_installed.stat.exists

- name: Set Codeium verification status
  ansible.builtin.set_fact:
    codeium_verified: "{{ 'Codeium.codeium' in (vscode_extensions.stdout | default('')) }}"
  when: vscode_installed.stat.exists

#-------------------------------------------------------------------------------
# Log Result
#-------------------------------------------------------------------------------

- name: Log Codeium installation success
  ansible.builtin.lineinfile:
    path: "{{ enhancement_log_dir }}/install.log"
    line: "{{ ansible_date_time.iso8601 }} - Codeium AI Code Completion installed"
    create: yes
    mode: '0644'
  when: codeium_verified | default(false)

- name: Log Codeium installation skip
  ansible.builtin.lineinfile:
    path: "{{ enhancement_log_dir }}/install.log"
    line: "{{ ansible_date_time.iso8601 }} - Codeium skipped (VS Code not found or install failed)"
    create: yes
    mode: '0644'
  when: not (codeium_verified | default(false))
