---
# ===============================================================================
# Phase 9.2: Modern CLI Tool Suite
# ===============================================================================
# Installs modern Rust-based CLI tools as replacements for traditional Unix utils
# ===============================================================================

# -------------------------------------------------------------------------------
# Install via APT (preferred)
# -------------------------------------------------------------------------------

- name: Install modern CLI tools from APT
  ansible.builtin.apt:
    name:
      - bat # cat with syntax highlighting
      - fd-find # fast find replacement
      - ripgrep # modern grep
      - fzf # fuzzy finder (also used in Phase 9.4)
    state: present
  register: enhancements_apt_cli_tools

#-------------------------------------------------------------------------------
# Install eza (modern ls) - not in Debian repos yet
#-------------------------------------------------------------------------------

- name: Check if eza is installed
  ansible.builtin.command: which eza
  register: enhancements_eza_check
  changed_when: false
  failed_when: false

- name: Install eza via cargo
  ansible.builtin.command: cargo install eza
  become: true
  become_user: "{{ vps_username }}"
  environment:
    HOME: "/home/{{ vps_username }}"
    PATH: "/home/{{ vps_username }}/.cargo/bin:{{ ansible_env.PATH }}"
  when: enhancements_eza_check.rc != 0
  register: enhancements_eza_install
  failed_when: false

- name: Download eza binary as fallback
  when: enhancements_eza_check.rc != 0 and (enhancements_eza_install.rc | default(1)) != 0
  block:
    - name: Download eza binary
      ansible.builtin.get_url:
        url: "https://github.com/eza-community/eza/releases/latest/download/eza_x86_64-unknown-linux-gnu.tar.gz"
        dest: "{{ enhancements_cache_dir }}/eza.tar.gz"
        mode: "0644"

    - name: Extract eza binary
      ansible.builtin.unarchive:
        src: "{{ enhancements_cache_dir }}/eza.tar.gz"
        dest: /usr/local/bin
        remote_src: true
        creates: /usr/local/bin/eza

#-------------------------------------------------------------------------------
# Install dust (visual disk usage)
#-------------------------------------------------------------------------------

- name: Check if dust is installed
  ansible.builtin.command: which dust
  register: enhancements_dust_check
  changed_when: false
  failed_when: false

- name: Download dust binary
  when: enhancements_dust_check.rc != 0
  block:
    - name: Download dust
      ansible.builtin.get_url:
        url: "https://github.com/bootandy/dust/releases/download/v{{ enhancements_dust_version }}/dust-v{{ enhancements_dust_version }}-x86_64-unknown-linux-gnu.tar.gz"
        dest: "{{ enhancements_cache_dir }}/dust.tar.gz"
        mode: "0644"

    - name: Extract dust
      ansible.builtin.unarchive:
        src: "{{ enhancements_cache_dir }}/dust.tar.gz"
        dest: "{{ enhancements_cache_dir }}"
        remote_src: true

    - name: Install dust
      ansible.builtin.copy:
        src: "{{ enhancements_cache_dir }}/dust-v{{ enhancements_dust_version }}-x86_64-unknown-linux-gnu/dust"
        dest: /usr/local/bin/dust
        remote_src: true
        mode: "0755"

#-------------------------------------------------------------------------------
# Install procs (modern ps)
#-------------------------------------------------------------------------------

- name: Check if procs is installed
  ansible.builtin.command: which procs
  register: enhancements_procs_check
  changed_when: false
  failed_when: false

- name: Download procs binary
  when: enhancements_procs_check.rc != 0
  block:
    - name: Download procs
      ansible.builtin.get_url:
        url: "https://github.com/dalance/procs/releases/download/v{{ enhancements_procs_version }}/procs-v{{ enhancements_procs_version }}-x86_64-linux.zip"
        dest: "{{ enhancements_cache_dir }}/procs.zip"
        mode: "0644"

    - name: Extract procs
      ansible.builtin.unarchive:
        src: "{{ enhancements_cache_dir }}/procs.zip"
        dest: /usr/local/bin
        remote_src: true
        creates: /usr/local/bin/procs

    - name: Set procs executable
      ansible.builtin.file:
        path: /usr/local/bin/procs
        mode: "0755"

#-------------------------------------------------------------------------------
# Create Symlinks for Debian naming
#-------------------------------------------------------------------------------

- name: Create fd symlink (Debian packages as fdfind)
  ansible.builtin.file:
    src: /usr/bin/fdfind
    dest: /usr/local/bin/fd
    state: link
  when: enhancements_apt_cli_tools is succeeded

- name: Create batcat symlink (Debian packages as batcat)
  ansible.builtin.file:
    src: /usr/bin/batcat
    dest: /usr/local/bin/bat
    state: link
  when: enhancements_apt_cli_tools is succeeded

#-------------------------------------------------------------------------------
# Configure bat
#-------------------------------------------------------------------------------

- name: Create bat config directory
  ansible.builtin.file:
    path: "/home/{{ vps_username }}/.config/bat"
    state: directory
    owner: "{{ vps_username }}"
    group: "{{ vps_username }}"
    mode: "0755"

- name: Create bat themes directory
  ansible.builtin.file:
    path: "/home/{{ vps_username }}/.config/bat/themes"
    state: directory
    owner: "{{ vps_username }}"
    group: "{{ vps_username }}"
    mode: "0755"

- name: Download Catppuccin Mocha theme for bat
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/catppuccin/bat/main/themes/Catppuccin%20Mocha.tmTheme"
    dest: "/home/{{ vps_username }}/.config/bat/themes/Catppuccin Mocha.tmTheme"
    owner: "{{ vps_username }}"
    group: "{{ vps_username }}"
    mode: "0644"
  register: enhancements_bat_theme_download

- name: Rebuild bat cache
  ansible.builtin.command: bat cache --build
  become: true
  become_user: "{{ vps_username }}"
  when: enhancements_bat_theme_download.changed

- name: Configure bat
  ansible.builtin.copy:
    content: |
      --theme="{{ enhancements_bat_theme }}"
      --style="numbers,changes,header"
      --italic-text=always
      --paging=auto
    dest: "/home/{{ vps_username }}/.config/bat/config"
    owner: "{{ vps_username }}"
    group: "{{ vps_username }}"
    mode: "0644"

#-------------------------------------------------------------------------------
# Set bat as MANPAGER
#-------------------------------------------------------------------------------

- name: Add MANPAGER configuration to zshrc.enhancements
  ansible.builtin.blockinfile:
    path: "/home/{{ vps_username }}/.zshrc.enhancements"
    marker: "# {mark} BAT MANPAGER"
    block: |
      # Use bat for man pages
      export MANPAGER="sh -c 'col -bx | bat -l man -p'"
    create: true
    owner: "{{ vps_username }}"
    group: "{{ vps_username }}"
    mode: "0644"

- name: Log modern CLI tools installation
  ansible.builtin.lineinfile:
    path: "{{ enhancements_log_dir }}/install.log"
    line: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ') }} - Modern CLI Tools installed"
    create: true
    mode: "0644"
