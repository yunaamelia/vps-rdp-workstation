---
# ===============================================================================
# Phase 9.9: Command Snippet Manager (pet)
# ===============================================================================
# Installs pet for managing and executing command snippets
# ===============================================================================

# -------------------------------------------------------------------------------
# Install pet
# -------------------------------------------------------------------------------

- name: Check if pet is installed
  ansible.builtin.command: which pet
  register: enhancements_pet_check
  changed_when: false
  failed_when: false

- name: Download pet
  when: enhancements_pet_check.rc != 0
  block:
    - name: Download pet binary
      ansible.builtin.get_url:
        url: "https://github.com/knqyf263/pet/releases/download/v{{ enhancements_pet_version }}/pet_{{ enhancements_pet_version }}_linux_amd64.tar.gz"
        dest: "{{ enhancements_cache_dir }}/pet.tar.gz"
        mode: "0644"

    - name: Extract pet
      ansible.builtin.unarchive:
        src: "{{ enhancements_cache_dir }}/pet.tar.gz"
        dest: "{{ enhancements_cache_dir }}"
        remote_src: true

    - name: Install pet
      ansible.builtin.copy:
        src: "{{ enhancements_cache_dir }}/pet"
        dest: /usr/local/bin/pet
        remote_src: true
        mode: "0755"

#-------------------------------------------------------------------------------
# Configure pet
#-------------------------------------------------------------------------------

- name: Create pet config directory
  ansible.builtin.file:
    path: "/home/{{ vps_username }}/.config/pet"
    state: directory
    owner: "{{ vps_username }}"
    group: "{{ vps_username }}"
    mode: "0755"

- name: Configure pet
  ansible.builtin.template:
    src: "pet-config.toml.j2"
    dest: "/home/{{ vps_username }}/.config/pet/config.toml"
    owner: "{{ vps_username }}"
    group: "{{ vps_username }}"
    mode: "0644"

#-------------------------------------------------------------------------------
# Pre-load common snippets
#-------------------------------------------------------------------------------

- name: Create snippet file with common commands
  ansible.builtin.copy:
    content: |
      [[snippets]]
      description = "Docker - Remove all stopped containers"
      command = "docker rm $(docker ps -a -q -f status=exited)"
      tag = ["docker", "cleanup"]

      [[snippets]]
      description = "Docker - Remove all unused images"
      command = "docker image prune -a -f"
      tag = ["docker", "cleanup"]

      [[snippets]]
      description = "Docker - Show container logs"
      command = "docker logs -f --tail=100 <container_name>"
      tag = ["docker", "logs"]

      [[snippets]]
      description = "Docker - Execute bash in container"
      command = "docker exec -it <container_name> bash"
      tag = ["docker", "exec"]

      [[snippets]]
      description = "Git - Undo last commit (keep changes)"
      command = "git reset --soft HEAD~1"
      tag = ["git", "undo"]

      [[snippets]]
      description = "Git - Stash with message"
      command = "git stash push -m '<message>'"
      tag = ["git", "stash"]

      [[snippets]]
      description = "Git - Interactive rebase last N commits"
      command = "git rebase -i HEAD~<n>"
      tag = ["git", "rebase"]

      [[snippets]]
      description = "System - Find large files (>100MB)"
      command = "find / -type f -size +100M 2>/dev/null | head -20"
      tag = ["system", "disk"]

      [[snippets]]
      description = "System - Show disk usage by directory"
      command = "dust -d 1"
      tag = ["system", "disk"]

      [[snippets]]
      description = "System - Monitor process in real-time"
      command = "watch -n 1 'procs <process_name>'"
      tag = ["system", "monitor"]

      [[snippets]]
      description = "NPM - Clear cache and reinstall"
      command = "rm -rf node_modules package-lock.json && npm install"
      tag = ["npm", "fix"]

      [[snippets]]
      description = "SSH - Generate ED25519 key"
      command = "ssh-keygen -t ed25519 -C '<email>'"
      tag = ["ssh", "security"]
    dest: "/home/{{ vps_username }}/.config/pet/snippet.toml"
    owner: "{{ vps_username }}"
    group: "{{ vps_username }}"
    mode: "0644"
    force: false # Don't overwrite if exists

#-------------------------------------------------------------------------------
# Add pet shell integration
#-------------------------------------------------------------------------------

- name: Add pet shell function to enhancements file
  ansible.builtin.blockinfile:
    path: "/home/{{ vps_username }}/.zshrc.enhancements"
    marker: "# {mark} PET SNIPPET MANAGER"
    block: |
      # Pet snippet manager integration
      if command -v pet &> /dev/null; then
        function pet-select() {
          BUFFER=$(pet search --query "$LBUFFER")
          CURSOR=$#BUFFER
          zle redisplay
        }
        zle -N pet-select
        bindkey '^x^p' pet-select  # Ctrl+X Ctrl+P

        # Quick new snippet from last command
        function pet-prev() {
          PREV=$(fc -lrn | head -n 1)
          sh -c "pet new $(printf %q "$PREV")"
        }
      fi
    create: true
    owner: "{{ vps_username }}"
    group: "{{ vps_username }}"
    mode: "0644"

- name: Log pet installation
  ansible.builtin.lineinfile:
    path: "{{ enhancements_log_dir }}/install.log"
    line: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ') }} - Pet Snippet Manager installed"
    create: true
    mode: "0644"
